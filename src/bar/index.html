<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: rgb(50, 50, 50);
            text-align: center;
        }

        a {
            text-decoration: none;
            color: rgb(250, 250, 250);
        }

        p {
            color: rgb(250, 250, 250);
        }

        #input {
            width: 400px;

        }

        #toolsbar {
            position: absolute;
            bottom: 0%;
            left: 0%;
            right: 0%;
        }

        /*
        -webkit-app-region: drag;
        -webkit-app-region: no-drag;
        */
    </style>
</head>

<!--https://github.com/yunshaoyy/toolsbox-->

<body>
    <div>
        <p></p>
        <input type="text" id="input">
        <p id="response"></p>
        <div>
            <!--<a href="help.html" target="_blank">帮助</a>-->
            <a href="javascript:void(0);" onclick="cleartext()">清除</a>
            <a href="javascript:void(0);" onclick="sendtext()">发送</a>
        </div>
        <p></p>
    </div>

    <div id="toolsbar">
        <p></p>
        <div>
            <a href="web/index.html" target="_blank">网页</a>
            <a href="media/index.html" target="_blank">媒体</a>
            <a href="whiteboard.html" target="_blank">白板</a>
            <a href="eggs/index.html" target="_blank">彩蛋</a>
            <a href="about.html" target="_blank">关于</a>
        </div>
        <p></p>
    </div>

    <script>
        function cleartext() {
            document.getElementById('response').innerText = "";
        }

        async function sendtext() {
            const content = document.getElementById('input').value.trim();
            let responseText = '';

            if (!content) {
                return;
            }

            if (content.includes("fdouyin070425")) {
                document.getElementById('input').value = '';
                window.open("https://www.douyin.com", "_blank");
                return;
            }
            if (content.includes("fyichafen070425")) {
                document.getElementById('input').value = '';
                window.open("https://i7w15pvd.yichafen.com", "_blank");
                return;
            }
            if (content.includes("fbilibili070425")) {
                document.getElementById('input').value = '';
                window.open("https://www.bilibili.com", "_blank");
                return;
            }
            //disabled
            if (content.includes("抖音")) {
                document.getElementById('input').value = '';
                window.open("web/disabled.html", "_blank");
                return;
            }
            if (content.includes("哔哩哔哩")) {
                document.getElementById('input').value = '';
                window.open("web/disabled.html", "_blank");
                return;
            }
            if (content.includes("易查分")) {
                document.getElementById('input').value = '';
                window.open("web/disabled.html", "_blank");
                return;
            }

            if (content.includes("嘻嘻")) {
                responseText = '嘻嘻';
            }
            else if (content.includes("嘿嘿")) {
                responseText = '嘿嘿';
            }
            else {
                const response = await fetch("https://v2.xxapi.cn/api/turing?msg=" + content);
                const data = await response.json();
                responseText = data.data;
            }

            document.getElementById('response').innerText = responseText;

            //tts
            const utterance = new SpeechSynthesisUtterance(responseText);
            speechSynthesis.speak(utterance);

            //clear
            document.getElementById('input').value = '';
        }
    </script>
</body>

</html>
