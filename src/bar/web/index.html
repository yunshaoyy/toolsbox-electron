<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: rgb(50, 50, 50);
            text-align: center;
        }

        h1 {
            color: rgb(250, 250, 250);
        }

        a {
            text-decoration: none;
            color: rgb(250, 250, 250);
        }

        p {
            color: rgb(250, 250, 250);
        }

        #toolsbar {
            position: absolute;
            top: 50%;
            left: 0%;
            right: 0%;
        }
    </style>
</head>

<!--https://github.com/yunshaoyy/toolsbox-->

<body>
    <p>https://example.com</p>
    <input type="text" id="input" style="width:1314px;"></input>
    <p><a href="javascript:void(0);" onclick='next()'>打开</a></p>

    <div id="toolsbar">
        <p></p>
        <div>
            <a href="https://www.douyin.com" target="_blank">抖音</a>
            <a href="https://i7w15pvd.yichafen.com" target="_blank">易查分</a>
            <a href="https://www.bilibili.com" target="_blank">哔哩哔哩</a>
        </div>
        <p></p>
    </div>

    <script>
        function next() {
            const content = document.getElementById('input').value.trim();
            if (content === "") {
                window.close();
            }
            else {
                if (content.match(/^https?:\/\//)) {
                    document.getElementById('input').value = '';
                    endcontent = content;
                }
                else {
                    window.close();
                }
                window.location.href = endcontent;
            }
        }
    </script>
</body>

</html>
