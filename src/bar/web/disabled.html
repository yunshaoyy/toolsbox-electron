<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: rgb(50, 50, 50);
            text-align: center;
        }

        a {
            text-decoration: none;
            color: rgb(250, 250, 250);
        }

        p {
            color: rgb(250, 250, 250);
        }
    </style>
</head>

<!--https://github.com/yunshaoyy/toolsbox-->

<body onload="tts()">
    <p>鉴权失败，关闭窗口请按“关闭”键。</p>
    <p><a href="javascript:void(0);" onclick='next()'>关闭</a></p>

    <script>
        function next() {
            window.close();

        }
        function tts() {
            //tts
            const utterance = new SpeechSynthesisUtterance("鉴权失败，关闭窗口请按“关闭”键。");
            speechSynthesis.speak(utterance);
        }
    </script>
</body>

</html>
