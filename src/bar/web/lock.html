<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: rgb(50, 50, 50);
            text-align: center;
        }

        a {
            text-decoration: none;
            color: rgb(250, 250, 250);
        }

        p {
            color: rgb(250, 250, 250);
        }
    </style>
</head>

<!--https://github.com/yunshaoyy/toolsbox-->

<body>
    <input type="text" id="input" style="width:1314px;"></input>
    <p><a href="javascript:void(0);" onclick='next()'>验证</a></p>

    <script>
        function next() {
            const content = document.getElementById('input').value.trim();
            if (content === "") {
                window.close()
            }
            else {
                if (content === "fweb070425") {
                    document.getElementById('input').value = '';
                    start();
                }
                else {
                    disabled();
                }
            }
        }
        function disabled() {
            window.location.href = "disabled.html";
        }
        function start() {
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
