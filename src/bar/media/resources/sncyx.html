<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            text-align: center;
            background: rgb(50, 50, 50);
        }

        audio {
            width: 1314px;
        }
    </style>
</head>
<!--https://github.com/yunshaoyy/toolsbox-->
<body>
    <audio id="audioplayer" src="sncyx.mp3" autoplay controls></audio>
    <script>
        const audio = document.getElementById('audioplayer');

        // 监听音频播放完成事件
        audio.addEventListener('ended', function () {
            // 音频播放结束后关闭页面
            window.close();
        });
    </script>
</body>

</html>
